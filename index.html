<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Google</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .header {
            font-size: 13px;
            padding: 12px 16px;
            text-align: right;
            background: #ffffff;
        }
        .header a {
            color: #00c;
            margin-left: 15px;
            text-decoration: underline;
            font-size: 13px;
        }
        .header a:hover {
            text-decoration: underline;
        }
        .user-email {
            font-weight: bold;
            color: #000000;
            margin-left: 15px;
            text-decoration: none;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -10vh;
        }

        /* Zero-failure retro text logo styling */
        .logo-text {
            font-size: 85px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            margin-bottom: 18px;
            letter-spacing: -4px;
        }
        .g-blue { color: #2633f8; }
        .g-red { color: #dd3c10; }
        .g-yellow { color: #ffba00; }
        .g-green { color: #228b22; }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .search-box {
            width: 450px;
            height: 24px;
            border: 1px solid #6b90da;
            border-top-color: #2c5d9f;
            padding: 3px 5px;
            font-size: 16px;
            outline: none;
        }

        .buttons {
            margin-top: 18px;
        }
        .btn {
            background-color: #f2f2f2;
            border: 1px solid #777777;
            border-bottom-color: #333333;
            border-right-color: #333333;
            color: #000000;
            font-family: Arial, sans-serif;
            font-size: 12px;
            padding: 4px 12px;
            margin: 0 4px;
            cursor: pointer;
        }
        .btn:hover {
            border: 1px solid #333333;
            background-color: #f8f8f8;
        }

        .footer {
            background: #f0f0f0;
            border-top: 1px solid #e4e4e4;
            padding: 10px 0;
            text-align: center;
            font-size: 11px;
            color: #666666;
        }
        .footer-links {
            margin-bottom: 4px;
        }
        .footer a {
            color: #00c;
            margin: 0 10px;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Top Navigation Links & Logged-In User Profile -->
    <div class="header">
        <a href="https://www.google.com/imghp">Images</a>
        <a href="https://mail.google.com">Gmail</a>
        <a href="https://www.google.com/options/">Even more &raquo;</a>
        <span style="margin-left: 30px;">
            <span class="user-email">yourname@gmail.com</span> | 
            <a href="https://myaccount.google.com/">My Account</a> | 
            <a href="#">Sign out</a>
        </span>
    </div>

    <!-- Center Content -->
    <div class="main-container">
        <!-- 2009 Multi-Colored Text Logo (Guaranteed to load instantly without broken hotlinks) -->
        <div class="logo-text">
            <span class="g-blue">G</span><span class="g-red">o</span><span class="g-yellow">o</span><span class="g-blue">g</span><span class="g-green">l</span><span class="g-red">e</span>
        </div>

        <form action="https://www.google.com/search" method="GET">
            <input type="text" name="q" class="search-box" autocomplete="off" autofocus>
            <div class="buttons">
                <input type="submit" class="btn" value="Google Search">
                <input type="submit" class="btn" name="btnI" value="I'm Feeling Lucky">
            </div>
        </form>
    </div>

    <!-- Bottom Footer -->
    <div class="footer">
        <div class="footer-links">
            <a href="https://www.google.com/intl/en/ads/">Advertising programs</a>
            <a href="https://www.google.com/services/">Business Solutions</a>
            <a href="https://www.google.com/intl/en/about.html">About Google</a>
        </div>
        <div>&copy;2009 Google</div>
    </div>

</body>
</html>
