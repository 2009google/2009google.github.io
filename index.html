<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Google</title>
    <!-- Authentic 2009 multi-colored 4-quadrant favicon (André Resende design introduced Jan 2009) -->
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/e/e6/Google_Favicon_2009.png" type="image/png">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .header {
            font-size: 13px;
            padding: 12px 16px;
            text-align: right;
            background: #ffffff;
        }
        .header a {
            color: #00c;
            margin-left: 15px;
            text-decoration: underline;
            font-size: 13px;
        }
        .header a:hover {
            text-decoration: underline;
        }
        .user-email {
            font-weight: bold;
            color: #000000;
            margin-left: 15px;
            text-decoration: none;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -10vh;
        }

        .logo-container {
            margin-bottom: 18px;
        }
        .logo-container img {
            width: 276px;
            height: 110px;
            border: none;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .search-box {
            width: 450px;
            height: 24px;
            border: 1px solid #6b90da;
            border-top-color: #2c5d9f;
            padding: 3px 5px;
            font-size: 16px;
            outline: none;
        }

        .buttons {
            margin-top: 18px;
        }
        .btn {
            background-color: #f2f2f2;
            border: 1px solid #777777;
            border-bottom-color: #333333;
            border-right-color: #333333;
            color: #000000;
            font-family: Arial, sans-serif;
            font-size: 12px;
            padding: 4px 12px;
            margin: 0 4px;
            cursor: pointer;
        }
        .btn:hover {
            border: 1px solid #333333;
            background-color: #f8f8f8;
        }

        .footer {
            background: #f0f0f0;
            border-top: 1px solid #e4e4e4;
            padding: 10px 0;
            text-align: center;
            font-size: 11px;
            color: #666666;
        }
        .footer-links {
            margin-bottom: 4px;
        }
        .footer a {
            color: #00c;
            margin: 0 10px;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Top Header -->
    <div class="header">
        <a href="https://www.google.com/imghp">Images</a>
        <a href="https://mail.google.com">Gmail</a>
        <a href="https://www.google.com/options/">Even more &raquo;</a>
        <span style="margin-left: 30px;">
            <span class="user-email">yourname@gmail.com</span> | 
            <a href="https://myaccount.google.com/">My Account</a> | 
            <a href="#">Sign out</a>
        </span>
    </div>

    <!-- Center Content -->
    <div class="main-container">
        <!-- 2009 Logo Image -->
        <div class="logo-container">
            <img src="https://www.google.com/images/srpr/logo11w.png" alt="Google 2009">
        </div>

        <!-- Search Form -->
        <form action="https://www.google.com/search" method="GET">
            <input type="text" name="q" class="search-box" autocomplete="off" autofocus>
            <div class="buttons">
                <input type="submit" class="btn" value="Google Search">
                <input type="submit" class="btn" name="btnI" value="I'm Feeling Lucky">
            </div>
        </form>
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="footer-links">
            <a href="https://www.google.com/intl/en/ads/">Advertising programs</a>
            <a href="https://www.google.com/services/">Business Solutions</a>
            <a href="https://www.google.com/intl/en/about.html">About Google</a>
        </div>
        <div>&copy;2009 Google</div>
    </div>

</body>
</html>
